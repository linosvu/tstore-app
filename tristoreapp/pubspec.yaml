name: tstore
description: "TStore - Mobile management app."

publish_to: "none"

version: 1.0.4

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.5
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4

  # Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.4.1

  # UI
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.1.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  video_player: ^2.9.5
  crypto: ^3.0.3
  path: ^1.9.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
